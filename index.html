<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Confirmações de Casamento</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=DM+Sans:wght@300;400;500&display=swap');
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --rose:#c9707a;--rose-light:#f7e8ea;--rose-dark:#8a3d46;
    --gold:#b8975a;--gold-light:#f5edd8;
    --bg:#ffffff;--bg2:#f9f6f6;--border:#e8dede;
    --text:#2c1f1f;--muted:#9a8080;
  }
  body{font-family:'DM Sans',sans-serif;color:var(--text);background:var(--bg)}
  .app{padding:1.5rem 1rem;max-width:900px;margin:0 auto}
  .header{text-align:center;margin-bottom:1.5rem;padding-bottom:1.5rem;border-bottom:0.5px solid var(--border)}
  .header h1{font-family:'Playfair Display',serif;font-size:28px;font-weight:500;color:var(--rose-dark);letter-spacing:0.02em}
  .header p{font-size:13px;color:var(--muted);margin-top:6px}
  .config-section{margin-bottom:1.5rem;display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .field-wrap{display:flex;flex-direction:column;gap:4px}
  .field-wrap label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em}
  input[type=text],textarea{width:100%;padding:9px 12px;border:0.5px solid var(--border);border-radius:8px;font-family:'DM Sans',sans-serif;font-size:13px;background:var(--bg);color:var(--text);resize:none}
  input[type=text]:focus,textarea:focus{outline:none;border-color:var(--rose)}
  textarea{grid-column:1/-1;height:90px}
  .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:1.5rem}
  .stat{background:var(--bg2);border-radius:8px;padding:12px 16px;text-align:center}
  .stat .num{font-size:22px;font-weight:500;color:var(--rose-dark)}
  .stat .lbl{font-size:11px;color:var(--muted);margin-top:2px;text-transform:uppercase;letter-spacing:0.06em}
  .search-bar{position:relative;margin-bottom:1rem}
  .search-bar input{padding-left:36px}
  .search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:14px;pointer-events:none}
  .filter-tabs{display:flex;gap:8px;margin-bottom:1rem}
  .tab{padding:6px 14px;border:0.5px solid var(--border);border-radius:20px;font-size:12px;cursor:pointer;background:var(--bg);color:var(--muted);transition:all 0.15s}
  .tab.active{background:var(--rose);border-color:var(--rose);color:#fff}
  .list{display:flex;flex-direction:column;gap:8px}
  .card{background:var(--bg);border:0.5px solid var(--border);border-radius:12px;overflow:hidden;transition:border-color 0.15s}
  .card:hover{border-color:var(--rose)}
  .card.sent{border-left:3px solid #639922}
  .card.pending{border-left:3px solid var(--gold)}
  .card-main{display:grid;grid-template-columns:auto 1fr auto;gap:12px;align-items:center;padding:14px 16px}
  .avatar{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:500;background:var(--rose-light);color:var(--rose-dark);flex-shrink:0}
  .card-info .group{font-size:12px;color:var(--muted);margin-bottom:2px}
  .card-info .name{font-size:14px;font-weight:500;color:var(--text)}
  .card-info .phone{font-size:12px;color:var(--muted)}
  .card-info .code-badge{display:inline-block;font-size:11px;background:var(--gold-light);color:var(--gold);padding:2px 8px;border-radius:4px;margin-top:4px;font-family:monospace;letter-spacing:0.04em}
  .card-actions{display:flex;flex-direction:column;align-items:flex-end;gap:6px}
  .btn-send{display:flex;align-items:center;gap:6px;padding:8px 14px;border-radius:8px;font-size:12px;font-weight:500;cursor:pointer;border:none;background:#25D366;color:#fff;transition:opacity 0.15s;white-space:nowrap}
  .btn-send:hover{opacity:0.85}
  .btn-send svg{width:14px;height:14px;fill:#fff;flex-shrink:0}
  .status-badge{font-size:10px;padding:3px 10px;border-radius:4px;font-weight:500;text-transform:uppercase;letter-spacing:0.06em}
  .status-badge.sent{background:#EAF3DE;color:#3B6D11}
  .status-badge.pending{background:var(--gold-light);color:var(--gold)}
  .row-btns{display:flex;gap:8px;align-items:center}
  .btn-icon{background:none;border:0.5px solid var(--border);border-radius:6px;padding:5px 8px;font-size:12px;cursor:pointer;color:var(--muted);transition:all 0.15s}
  .btn-icon:hover{border-color:var(--rose);color:var(--rose)}
  .edit-panel{border-top:0.5px solid var(--border);padding:14px 16px;background:var(--bg2);display:none}
  .edit-panel.open{display:block}
  .edit-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:10px}
  .edit-grid .field-wrap:last-child{grid-column:1/-1}
  .edit-actions{display:flex;gap:8px;justify-content:flex-end}
  .btn-save{padding:8px 18px;border-radius:8px;font-size:12px;font-weight:500;cursor:pointer;border:none;background:var(--rose);color:#fff}
  .btn-cancel-edit{padding:8px 14px;border-radius:8px;font-size:12px;cursor:pointer;border:0.5px solid var(--border);background:var(--bg);color:var(--muted)}
  .overlay{position:fixed;inset:0;background:rgba(0,0,0,0.45);display:flex;align-items:center;justify-content:center;z-index:100;padding:1rem}
  .preview-box{background:var(--bg);border-radius:16px;padding:1.5rem;max-width:420px;width:100%;border:0.5px solid var(--border)}
  .preview-box h3{font-family:'Playfair Display',serif;font-size:18px;margin-bottom:1rem;color:var(--rose-dark)}
  .preview-msg{background:var(--bg2);border-radius:8px;padding:14px;font-size:13px;line-height:1.7;color:var(--text);white-space:pre-wrap;word-break:break-word;margin-bottom:1rem;border:0.5px solid var(--border)}
  .preview-actions{display:flex;gap:8px}
  .btn-cancel{padding:10px 18px;border:0.5px solid var(--border);border-radius:8px;font-size:13px;cursor:pointer;background:var(--bg);color:var(--muted)}
  .btn-wa{display:flex;align-items:center;gap:8px;padding:10px 18px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;border:none;background:#25D366;color:#fff;text-decoration:none}
  .empty{text-align:center;padding:3rem;color:var(--muted);font-size:14px}
  .save-note{font-size:11px;color:var(--muted);text-align:center;margin-top:1.5rem;padding-top:1rem;border-top:0.5px solid var(--border)}
  .loading-overlay{position:fixed;inset:0;background:rgba(255,255,255,0.92);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:200;gap:12px}
  .loading-overlay p{font-size:13px;color:var(--muted)}
  .spinner{width:28px;height:28px;border:3px solid var(--rose-light);border-top-color:var(--rose);border-radius:50%;animation:spin 0.7s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}

  @media (max-width: 600px) {
    .app{padding:1rem 0.75rem}
    .header h1{font-size:22px}
    .config-section{grid-template-columns:1fr;gap:10px}
    textarea{grid-column:1/-1;height:100px}
    .stats{grid-template-columns:repeat(3,1fr);gap:8px}
    .stat{padding:10px 8px}
    .stat .num{font-size:18px}
    .stat .lbl{font-size:10px}
    .filter-tabs{flex-wrap:wrap;gap:6px}
    .card-main{grid-template-columns:auto 1fr;gap:10px;padding:12px}
    .card-actions{display:none}
    .card-mobile-footer{display:flex;align-items:center;justify-content:space-between;padding:8px 12px 12px;flex-wrap:wrap;gap:8px}
    .edit-grid{grid-template-columns:1fr;gap:8px}
    .edit-grid .field-wrap:last-child{grid-column:1}
    .preview-box{padding:1.25rem;max-width:100%}
    .preview-actions{flex-direction:column}
    .preview-actions .btn-cancel,.preview-actions .btn-wa{width:100%;justify-content:center;text-align:center}
  }
  @media (min-width: 601px) {
    .card-mobile-footer{display:none}
  }
</style>

// ── Helpers ───────────────────────────────────────────────────
function phoneToWa(raw) {
  let n = raw.replace(/\D/g,'');
  if(n.length<=9) return n;
  if(!n.startsWith('55') && n.length<=13) n='55'+n;
  return n;
}
function initials(name) {
  const p = name.trim().split(' ');
  if(p.length===1) return p[0].slice(0,2).toUpperCase();
  return (p[0][0]+(p[p.length-1][0]||'')).toUpperCase();
}
function escHtml(s) {
  return String(s).replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── Estado ────────────────────────────────────────────────────
let guests        = [];
let sentMap       = {};
let currentFilter = 'all';
let activeIdx     = null;
let openEditId    = null;
let saveTimer     = null;

// ── Firebase: ler e gravar ────────────────────────────────────
async function fbGet(key) {
  try {
    const snap = await getDoc(doc(db, 'wedding', key));
    return snap.exists() ? snap.data().value : null;
  } catch(e) { return null; }
}
async function fbSet(key, value) {
  await setDoc(doc(db, 'wedding', key), { value });
}

// ── Load ──────────────────────────────────────────────────────
async function loadState() {
  document.getElementById('loading-overlay').style.display = 'flex';
  try {
    const [gs, sm, cfg] = await Promise.all([
      fbGet('guests'),
      fbGet('sentMap'),
      fbGet('config')
    ]);
    if (gs) guests = JSON.parse(gs);
    if (sm) {
      const raw = JSON.parse(sm);
      sentMap = {};
      // Chaves voltam como string do JSON — converter para número
      Object.keys(raw).forEach(k => { sentMap[Number(k)] = raw[k]; });
    }
    if (cfg) {
      const c = JSON.parse(cfg);
      if (c.link) document.getElementById('link-site').value = c.link;
      if (c.msg)  document.getElementById('msg-template').value = c.msg;
    }
  } catch(e) {
    console.error('Erro ao carregar dados:', e);
  }
  if (!guests || guests.length === 0) {
    guests = RAW_DATA.map((r,i) => ({ id:i, group:r[0], name:r[1], phone:r[2], code:r[0] }));
  }
  document.getElementById('loading-overlay').style.display = 'none';
  renderAll();
}

// ── Save ──────────────────────────────────────────────────────
async function saveState() {
  const note = document.getElementById('save-note');
  note.textContent = '⏳ Salvando...';
  try {
    const link = document.getElementById('link-site').value;
    const msg  = document.getElementById('msg-template').value;
    await Promise.all([
      fbSet('guests',  JSON.stringify(guests)),
      fbSet('sentMap', JSON.stringify(sentMap)),
      fbSet('config',  JSON.stringify({ link, msg }))
    ]);
    note.textContent = '✓ Salvo em ' + new Date().toLocaleTimeString('pt-BR');
  } catch(e) {
    note.textContent = '⚠ Erro ao salvar. Verifique a conexão.';
    console.error(e);
  }
}
function debounceSave() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(saveState, 800);
}

// ── Render ────────────────────────────────────────────────────
const WA_SVG = `<svg viewBox="0 0 24 24" width="14" height="14" fill="#fff"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 0C5.373 0 0 5.373 0 12c0 2.125.554 4.122 1.524 5.855L0 24l6.29-1.507A11.95 11.95 0 0012 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 21.818a9.818 9.818 0 01-5.017-1.376l-.36-.213-3.732.979.996-3.638-.234-.374A9.818 9.818 0 012.182 12C2.182 6.573 6.573 2.182 12 2.182S21.818 6.573 21.818 12 17.427 21.818 12 21.818z"/></svg>`;

function renderAll() {
  const q    = document.getElementById('search').value.toLowerCase();
  const list = document.getElementById('guest-list');
  const filtered = guests.filter(g => {
    const mq = !q || g.name.toLowerCase().includes(q) || g.group.toLowerCase().includes(q) || g.phone.includes(q) || g.code.toLowerCase().includes(q);
    const mf = currentFilter==='all' || (currentFilter==='sent'&&sentMap[g.id]) || (currentFilter==='pending'&&!sentMap[g.id]);
    return mq && mf;
  });
  document.getElementById('total-count').textContent   = guests.length;
  document.getElementById('sent-count').textContent    = Object.keys(sentMap).length;
  document.getElementById('pending-count').textContent = guests.length - Object.keys(sentMap).length;
  if (!filtered.length) { list.innerHTML = '<div class="empty">Nenhum convidado encontrado.</div>'; return; }

  list.innerHTML = filtered.map(g => {
    const sent   = !!sentMap[g.id];
    const isOpen = openEditId === g.id;
    return `<div class="card ${sent?'sent':'pending'}" id="card-${g.id}">
      <div class="card-main">
        <div class="avatar">${initials(g.name)}</div>
        <div class="card-info">
          <div class="group">${g.group}</div>
          <div class="name">${g.name}</div>
          <div class="phone">${g.phone}</div>
          <div class="code-badge">${g.code}</div>
        </div>
        <div class="card-actions">
          <span class="status-badge ${sent?'sent':'pending'}">${sent?'✓ Enviado':'Pendente'}</span>
          <div class="row-btns">
            <button class="btn-icon" onclick="toggleEdit(${g.id})">&#9998; Editar</button>
            <button class="btn-send" onclick="openPreview(${g.id})">${WA_SVG} Enviar</button>
          </div>
          <span style="font-size:10px;color:var(--muted);cursor:pointer;text-decoration:underline" onclick="toggleStatus(${g.id})">${sent?'Marcar pendente':'Marcar enviado'}</span>
        </div>
        <div class="card-mobile-footer">
          <div style="display:flex;align-items:center;gap:8px;">
            <span class="status-badge ${sent?'sent':'pending'}">${sent?'✓ Enviado':'Pendente'}</span>
            <span style="font-size:10px;color:var(--muted);cursor:pointer;text-decoration:underline" onclick="toggleStatus(${g.id})">${sent?'Marcar pendente':'Marcar enviado'}</span>
          </div>
          <div style="display:flex;gap:8px;">
            <button class="btn-icon" onclick="toggleEdit(${g.id})">&#9998; Editar</button>
            <button class="btn-send" onclick="openPreview(${g.id})">${WA_SVG} Enviar</button>
          </div>
        </div>
      </div>
      <div class="edit-panel ${isOpen?'open':''}" id="edit-${g.id}">
        <div class="edit-grid">
          <div class="field-wrap"><label>Nome</label><input type="text" id="edit-name-${g.id}" value="${escHtml(g.name)}" /></div>
          <div class="field-wrap"><label>Telefone</label><input type="text" id="edit-phone-${g.id}" value="${escHtml(g.phone)}" /></div>
          <div class="field-wrap"><label>Código</label><input type="text" id="edit-code-${g.id}" value="${escHtml(g.code)}" /></div>
          <div class="field-wrap" style="grid-column:1/-1"><label>Grupo / Família</label><input type="text" id="edit-group-${g.id}" value="${escHtml(g.group)}" /></div>
        </div>
        <div class="edit-actions">
          <button class="btn-cancel-edit" onclick="cancelEdit(${g.id})">Cancelar</button>
          <button class="btn-save" onclick="saveEdit(${g.id})">&#10003; Salvar alterações</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

// ── Ações (expostas globalmente para os onclick inline) ───────
window.toggleEdit = id => { openEditId = openEditId===id ? null : id; renderAll(); };
window.cancelEdit = id => { openEditId = null; renderAll(); };

window.saveEdit = id => {
  const g = guests.find(x=>x.id===id);
  if(!g) return;
  g.name  = document.getElementById('edit-name-'+id).value.trim()  || g.name;
  g.phone = document.getElementById('edit-phone-'+id).value.trim() || g.phone;
  g.code  = document.getElementById('edit-code-'+id).value.trim()  || g.code;
  g.group = document.getElementById('edit-group-'+id).value.trim() || g.group;
  openEditId = null;
  saveState();
  renderAll();
};

window.openPreview = id => {
  activeIdx = id;
  const g    = guests.find(x=>x.id===id);
  const link = document.getElementById('link-site').value || 'https://seusite.com.br/confirmar';
  const tpl  = document.getElementById('msg-template').value;
  const msg  = tpl.replace('{nome}', g.name.split(' ')[0]).replace('{link}', link).replace('{codigo}', g.code);
  document.getElementById('preview-msg').textContent = msg;
  document.getElementById('preview-wa-link').href = `https://wa.me/${phoneToWa(g.phone)}?text=${encodeURIComponent(msg)}`;
  document.getElementById('preview-modal').style.display = 'flex';
};

window.closePreview = () => {
  document.getElementById('preview-modal').style.display = 'none';
  activeIdx = null;
};

window.confirmSend = () => {
  if (activeIdx !== null) {
    sentMap[activeIdx] = true;
    saveState();
    setTimeout(() => { closePreview(); renderAll(); }, 150);
  }
};

window.toggleStatus = id => {
  if (sentMap[id]) delete sentMap[id]; else sentMap[id] = true;
  saveState();
  renderAll();
};

window.setFilter = (f, el) => {
  currentFilter = f;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  renderAll();
};

// ── Listeners ─────────────────────────────────────────────────
document.getElementById('search').addEventListener('input', renderAll);
document.getElementById('link-site').addEventListener('input', debounceSave);
document.getElementById('msg-template').addEventListener('input', debounceSave);
document.getElementById('preview-modal').addEventListener('click', e => { if(e.target===e.currentTarget) closePreview(); });

// ── Init ──────────────────────────────────────────────────────
loadState();
</script>
</body>
</html>
